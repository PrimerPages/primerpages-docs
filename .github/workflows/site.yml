run-name: >-
  ${{
    github.event_name == 'repository_dispatch' &&
    format('Dispatch rebuild {0}', github.event.client_payload.dispatch_id) ||
    github.workflow
  }}

name: Deploy semiliterate docs site

on:
  pull_request:
  push:
    branches: [main]
  workflow_dispatch:
  repository_dispatch:
    types: [theme-release, force-rebuild]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-${{ github.event.repository.name }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.x'

      - name: Install semiliterate
        shell: bash
        run: python -m pip install semiliterate

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1.306.0
        with:
          ruby-version: '3.3'
          bundler-cache: true

      - name: Setup Pages
        id: pages
        uses: actions/configure-pages@v6

      - name: Build site
        shell: bash
        run: |
          semiliterate build \
            --config ./semiliterate.yml \
            --source . \
            --out ./site \
            --include-mode copy \
            --verbose

          bundle exec jekyll build \
            --source ./site \
            --destination ./_site \
            --baseurl "${{ steps.pages.outputs.base_path }}"

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5

  deploy:
    if: |
      (github.event_name == 'push' && github.ref == 'refs/heads/main') ||
      github.event_name == 'workflow_dispatch' ||
      github.event_name == 'repository_dispatch'
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5

  test:
    runs-on: ubuntu-latest
    name: Run site tests
    needs: build
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: github-pages
          path: ./artifact

      - name: Extract site
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p _site
          if [ -f ./artifact/artifact.tar ]; then
            tar --directory _site -xvf ./artifact/artifact.tar
          else
            TAR_FILE="$(find ./artifact -maxdepth 2 -type f -name '*.tar' | head -n1)"
            if [ -n "$TAR_FILE" ]; then
              tar --directory _site -xvf "$TAR_FILE"
            else
              cp -R ./artifact/. _site/
            fi
          fi

      - name: Cache HTMLProofer
        uses: actions/cache@v5
        with:
          path: tmp/.htmlproofer
          key: ${{ runner.os }}-htmlproofer

      - name: Test with htmlproofer
        uses: athackst/htmlproofer-action@v2.0.0

      - name: Save cache
        if: always()
        uses: actions/cache/save@v5
        with:
          key: ${{ runner.os }}-htmlproofer
          path: tmp/.htmlproofer
